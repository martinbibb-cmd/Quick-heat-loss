<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="24" fill="#1a56db"/>
  <!-- House outline -->
  <polygon points="96,28 168,82 168,166 24,166 24,82" fill="none" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
  <!-- Floor-plan dashed lines (sketch feel) -->
  <line x1="96" y1="82" x2="96" y2="166" stroke="#fff" stroke-width="4" stroke-dasharray="8,6" opacity="0.7"/>
  <line x1="24" y1="130" x2="168" y2="130" stroke="#fff" stroke-width="4" stroke-dasharray="8,6" opacity="0.7"/>
  <!-- kW label -->
  <text x="96" y="114" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700">kW</text>
</svg>
